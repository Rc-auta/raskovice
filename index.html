<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ZRU Raškovice - Evidence</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #2a2a2a; }
        th, td { border: 1px solid #444; padding: 12px; }
        th { background: #333; color: #ff9800; }
        .buggy { color: #00e5ff; }
        .truggy { color: #ff4081; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { background: #ff9800; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #e68a00; }
        .galerie img { width: 100%; border-radius: 10px; margin-bottom: 10px; border: 2px solid #ff9800; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏎️ ZRU Raškovice - Registrace</h1>
        
        <div class="galerie">
            <img src="foto1.jpg" alt="RC Auto">
        </div>

        <div style="background: #333; padding: 20px; border-radius: 10px;">
            <input type="text" id="jmeno" placeholder="Jméno a příjmení">
            <select id="auto">
                <option value="BUGGY">BUGGY</option>
                <option value="TRUGGY">TRUGGY</option>
            </select>
            <button onclick="pridatJezdce()">Registrovat na závod</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Pořadí</th>
                    <th>Jezdec</th>
                    <th>Kategorie</th>
                </tr>
            </thead>
            <tbody id="seznam">
                </tbody>
        </table>
        
        <button onclick="vymazatVse()" style="margin-top: 30px; background: #ff4444;">Smazat celou listinu</button>
    </div>

    <script>
        // Funkce, která se spustí hned po načtení stránky
        window.onload = function() {
            nactiData();
        };

        function pridatJezdce() {
            const jmeno = document.getElementById('jmeno').value;
            const auto = document.getElementById('auto').value;

            if (jmeno === "") { alert("Napiš jméno!"); return; }

            const novyJezdec = { jmeno: jmeno, auto: auto };

            // 1. Vezmeme stará data z paměti
            let ulozenaData = JSON.parse(localStorage.getItem('raskovice_jezdci') || "[]");
            
            // 2. Přidáme nového jezdce
            ulozenaData.push(novyJezdec);
            
            // 3. Uložíme zpět do paměti prohlížeče
            localStorage.setItem('raskovice_jezdci', JSON.stringify(ulozenaData));

            document.getElementById('jmeno').value = ""; // vyčistit políčko
            nactiData(); // překreslit tabulku
        }

        function nactiData() {
            const seznam = document.getElementById('seznam');
            seznam.innerHTML = ""; // vymazat tabulku před překreslením
            
            const data = JSON.parse(localStorage.getItem('raskovice_jezdci') || "[]");

            data.forEach((jezdec, index) => {
                const radek = seznam.insertRow();
                radek.innerHTML = `
                    <td>${index + 1}.</td>
                    <td>${jezdec.jmeno}</td>
                    <td class="${jezdec.auto.toLowerCase()}">${jezdec.auto}</td>
                `;
            });
        }

        function vymazatVse() {
            if (confirm("Opravdu chceš smazat všechny jezdce?")) {
                localStorage.removeItem('raskovice_jezdci');
                nactiData();
            }
        }
    </script>
</body>
</html>
