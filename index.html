<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZRU Raškovice | Registrace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        .btn-primary { background-color: #1e40af; transition: 0.2s; cursor: pointer; }
        .btn-primary:hover { background-color: #1d4ed8; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <header class="bg-blue-800 text-white py-10 text-center">
        <h1 class="text-5xl font-black italic uppercase italic">ZRU RAŠKOVICE</h1>
        <p class="text-blue-200 mt-2 font-bold uppercase tracking-widest">Live Registrace 2026</p>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-white p-8 rounded-2xl shadow-lg border">
                <h2 class="text-2xl font-bold mb-6">Zapiš se na závod</h2>
                <div class="space-y-4">
                    <input type="text" id="input-jmeno" placeholder="Tvoje jméno a příjmení..." 
                        class="w-full border-2 rounded-xl py-4 px-6 focus:border-blue-500 outline-none font-bold text-xl">
                    <button onclick="odeslatDoDatabaze()" class="btn-primary w-full text-white font-black py-5 rounded-xl shadow-lg uppercase tracking-wider text-lg active:scale-95 transition-all">
                        Odeslat přihlášku
                    </button>
                </div>
            </div>

            <div class="bg-slate-900 text-white p-8 rounded-2xl shadow-lg text-center flex flex-col justify-center">
                <p class="text-slate-400 font-bold uppercase text-xs mb-2 tracking-widest">Aktuálně přihlášeno</p>
                <div id="pocitadlo" class="text-8xl font-black italic">0</div>
                <p class="mt-4 text-slate-500 font-bold uppercase text-xs">Limit: 20 pilotů</p>
            </div>

        </div>

        <div class="mt-8 bg-white rounded-2xl shadow-lg border overflow-hidden">
            <div class="bg-slate-50 px-6 py-4 border-b font-bold text-slate-600 uppercase text-xs tracking-widest">Startovní listina</div>
            <div id="seznam-jezdcu" class="divide-y divide-slate-100">
                <p class="p-6 text-center text-slate-400 italic">Načítám data z Raškovic...</p>
            </div>
        </div>
    </main>

    <script>
        // TVOJE PŘESNÁ KONFIGURACE (Opravená adresa databáze)
        const firebaseConfig = {
            apiKey: "AIzaSyCLApQOE2w3sO-wGSfMWZQgjdZidIMNvHA",
            authDomain: "zru-rc.firebaseapp.com",
            projectId: "zru-rc",
            storageBucket: "zru-rc.appspot.com",
            messagingSenderId: "778417701253",
            appId: "1:778417701253:web:afdfad7a4e69d29f4fc4ec",
            // Tady byla ta chyba - teď je tam ta tvoje adresa z fotky:
            databaseURL: "https://zru-rc-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function odeslatDoDatabaze() {
            const input = document.getElementById('input-jmeno');
            const jmeno = input.value.trim();

            if (jmeno === "") {
                alert("Napiš jméno!");
                return;
            }

            database.ref('jezdci').push({
                jmeno: jmeno,
                cas: Date.now()
            })
            .then(() => {
                input.value = "";
            })
            .catch((error) => {
                alert("Chyba: " + error.message);
            });
        }

        // Automatické načítání
        database.ref('jezdci').on('value', (snapshot) => {
            const data = snapshot.val();
            const seznam = document.getElementById('seznam-jezdcu');
            const pocitadlo = document.getElementById('pocitadlo');
            
            seznam.innerHTML = "";
            let pocet = 0;

            if (data) {
                // Seřadíme od nejnovějších
                const entries = Object.values(data).reverse();
                entries.forEach(jezdec => {
                    const div = document.createElement('div');
                    div.className = "p-4 px-8 flex justify-between items-center font-bold text-slate-800";
                    div.innerHTML = `<span>${jezdec.jmeno}</span><span class="text-blue-600 text-[10px] bg-blue-50 px-2 py-1 rounded">POTVRZENO</span>`;
                    seznam.appendChild(div);
                    pocet++;
                });
            } else {
                seznam.innerHTML = '<p class="p-8 text-center text-slate-400 italic">Zatím nikdo, buď první!</p>';
            }
            pocitadlo.innerText = pocet;
        });
    </script>
</body>
</html>
