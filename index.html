<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZRU - Race Control Portal</title>
    <style>
        :root {
            --primary: #00ff00;
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --text: #e0e0e0;
            --accent-red: #ff4444;
            --row-alt: #252525;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-info {
            text-align: center; padding: 40px 20px;
            background: linear-gradient(180deg, #000 0%, var(--bg-dark) 100%);
            width: 100%; box-sizing: border-box;
        }

        .warning-bar {
            background: rgba(255, 68, 68, 0.15); border: 1px solid var(--accent-red);
            color: #ffcccc; padding: 15px; margin: 20px auto; border-radius: 8px;
            font-weight: bold; max-width: 650px;
        }

        .tab-container {
            display: flex; background-color: #000; width: 100%;
            justify-content: center; position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--primary);
        }

        .tab-button {
            background: none; border: none; color: white; padding: 20px;
            cursor: pointer; font-weight: bold; text-transform: uppercase;
            font-size: 0.9em; transition: 0.3s;
        }

        .tab-button.active { color: var(--primary); border-bottom: 4px solid var(--primary); }

        .tab-content { display: none; width: 95%; max-width: 1100px; margin-top: 20px; }
        .tab-content.active { display: block; }

        .card {
            background-color: var(--bg-card); border-radius: 12px; padding: 25px;
            border: 1px solid #333; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 { color: var(--primary); text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #444;
            transition: 0.3s ease;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #000; color: var(--primary); text-transform: uppercase; font-size: 0.75em; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        tr:nth-child(even) { background-color: var(--row-alt); }

        .points-badge { background: var(--primary); color: black; padding: 2px 8px; border-radius: 4px; font-weight: bold; }

        .history-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .hist-btn { 
            background: #333; color: white; border: 1px solid var(--primary); 
            padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .hist-btn:hover { background: var(--primary); color: black; }

        #admin-lock { text-align: center; padding: 40px; }
        .admin-input { 
            background: #000; border: 1px solid #444; color: white; 
            padding: 12px; border-radius: 6px; width: 250px; margin-bottom: 10px;
        }

        .main-btn {
            padding: 12px 25px; background-color: var(--primary); border: none;
            color: black; font-weight: bold; cursor: pointer; border-radius: 6px; 
            text-transform: uppercase;
        }

        .bracket { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .group-card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 8px; border: 1px solid #444; }
        .slot { background: #333; padding: 12px; margin: 8px 0; border-radius: 4px; border-left: 4px solid var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-info">
        <h1>ZRU RAŠKOVICE</h1>
        <div class="warning-bar">🏁 PŘÍŠTÍ ZÁVOD: 29. 3. 2026</div>
    </div>

    <div class="tab-container">
        <button class="tab-button active" onclick="openTab(event, 'registrace')">Registrace</button>
        <button class="tab-button" onclick="openTab(event, 'pavouk')">Pavouk</button>
        <button class="tab-button" onclick="openTab(event, 'vysledky')">Síň Slávy</button>
        <button class="tab-button" onclick="openTab(event, 'historie')">Odjeté Jízdy</button>
        <button class="tab-button" onclick="openTab(event, 'admin')">Admin</button>
    </div>

    <div id="registrace" class="tab-content active">
        <div class="card">
            <h2>📝 Přihláška</h2>
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSex1pe5jkqu8VMyg95sUufl3WhH_B0Q-9LYcaNA2jBg6V2jRw/viewform?embedded=true" width="100%" height="700" frameborder="0">Načítám…</iframe>
        </div>
        <div class="card">
            <h2>📸 Momentky z tratě</h2>
            <div class="gallery">
                <img src="foto1.jpg"> <img src="foto2.jpg"> <img src="foto3.jpg"> <img src="foto4.jpg">
            </div>
        </div>
    </div>

    <div id="pavouk" class="tab-content">
        <div class="card">
            <h2>🎮 Kvalifikační skupiny</h2>
            <div class="bracket">
                <div class="group-card"><h3>SKUPINA A</h3><div id="p-q1"></div></div>
                <div class="group-card"><h3>SKUPINA B</h3><div id="p-q2"></div></div>
            </div>
        </div>
    </div>

    <div id="vysledky" class="tab-content">
        <div class="card">
            <h2>🏆 Celkové Pořadí Šampionátu</h2>
            <table>
                <thead>
                    <tr><th>#</th><th>Jezdec</th><th>Kola Celkem</th><th>Body</th></tr>
                </thead>
                <tbody id="full-tabulka-body"></tbody>
            </table>
        </div>
    </div>

    <div id="historie" class="tab-content">
        <div class="card">
            <h2>🏁 Archiv odjetých jízd</h2>
            <div id="seznam-jizd" class="history-grid"></div>
            
            <div id="detail-jizdy" style="display:none; margin-top:20px; padding:20px; background:#000; border-radius:10px; border: 1px solid var(--primary);">
                <h3 id="jizda-nazev" style="color:var(--primary); margin-top:0;"></h3>
                <table>
                    <thead><tr><th>#</th><th>Jezdec</th><th>Kola</th><th>Body</th></tr></thead>
                    <tbody id="jizda-tabulka"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="admin" class="tab-content">
        <div id="admin-lock">
            <h2>🔒 Admin Přístup</h2>
            <input type="password" id="pass-input" class="admin-input" placeholder="Zadej heslo">
            <br>
            <button class="main-btn" onclick="checkPass()">Vstoupit</button>
        </div>

        <div id="admin-content" style="display:none;">
            <div class="card">
                <h2>📊 Správa Pavouka</h2>
                <input type="text" id="adm-jmeno" class="admin-input" placeholder="Jméno jezdce">
                <button class="main-btn" onclick="pridatDoPavouka()">Přidat do pavouka</button>
                <button class="main-btn" style="background:red;" onclick="if(confirm('Opravdu resetovat vše?')) {localStorage.removeItem('zru_d'); location.reload();}">Resetovat paměť pavouka</button>
            </div>
            <div class="card">
                <div class="gallery">
                    <img src="foto5.jpg"> <img src="foto6.jpg"> <img src="foto7.jpg">
                </div>
            </div>
        </div>
    </div>

    <script>
        const bodovani = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];
        const historieZavodu = []; // Zde doplňuješ výsledky pro Sini slávy

        // --- FIX: TADY JSOU JEZDCI NAPEVNO PRO VŠECHNY ---
        const jezdciNapevno = [
            {j: "Filip Mikloš"},
            {j: "Vojta Bialek"}
        ];

        function checkPass() {
            const pass = document.getElementById('pass-input').value;
            if(pass === "Stepisev99") {
                document.getElementById('admin-lock').style.display = "none";
                document.getElementById('admin-content').style.display = "block";
            } else { alert("Špatné heslo!"); }
        }

        function openTab(evt, t) {
            let c = document.getElementsByClassName("tab-content");
            for (let i=0; i<c.length; i++) c[i].classList.remove("active");
            let b = document.getElementsByClassName("tab-button");
            for (let i=0; i<b.length; i++) b[i].classList.remove("active");
            document.getElementById(t).classList.add("active");
            evt.currentTarget.classList.add("active");
            if(t === 'vysledky') vypocitejSampionat();
            if(t === 'historie') vykresliHistorii();
        }

        function vypocitejSampionat() {
            let sampionat = {};
            historieZavodu.forEach(zavod => {
                let serazeni = [...zavod.data].sort((a,b) => b.k - a.k);
                serazeni.forEach((jezdec, index) => {
                    if (!sampionat[jezdec.j]) sampionat[jezdec.j] = { body: 0, kola: 0 };
                    sampionat[jezdec.j].kola += jezdec.k;
                    sampionat[jezdec.j].body += (bodovani[index] || 0);
                });
            });
            let vysledkyPole = Object.keys(sampionat).map(jmeno => ({
                jmeno: jmeno, ...sampionat[jmeno]
            })).sort((a,b) => b.body - a.body || b.kola - a.kola);

            let tbody = document.getElementById('full-tabulka-body');
            tbody.innerHTML = vysledkyPole.length ? "" : "<tr><td colspan='4'>Zatím žádná data.</td></tr>";
            vysledkyPole.forEach((r, i) => {
                tbody.innerHTML += `<tr><td>${i+1}.</td><td>${r.jmeno}</td><td>${r.kola}</td><td><span class="points-badge">${r.body} b</span></td></tr>`;
            });
        }

        function vykresliHistorii() {
            let div = document.getElementById('seznam-jizd');
            div.innerHTML = historieZavodu.length ? "" : "Historie je prázdná.";
            historieZavodu.forEach(z => {
                div.innerHTML += `<button class="hist-btn" onclick="ukazJizdu(${z.id})">${z.nazev}</button>`;
            });
        }

        function ukazJizdu(id) {
            let z = historieZavodu.find(x => x.id === id);
            document.getElementById('jizda-nazev').innerText = z.nazev;
            let tb = document.getElementById('jizda-tabulka');
            tb.innerHTML = "";
            let serazeni = [...z.data].sort((a,b) => b.k - a.k);
            serazeni.forEach((r, i) => {
                tb.innerHTML += `<tr><td>${i+1}.</td><td>${r.j}</td><td>${r.k}</td><td>+${bodovani[i] || 0}b</td></tr>`;
            });
            document.getElementById('detail-jizdy').style.display = "block";
        }

        function pridatDoPavouka() {
            let j = document.getElementById('adm-jmeno').value;
            if(!j) return;
            let d = JSON.parse(localStorage.getItem('zru_d') || JSON.stringify(jezdciNapevno));
            d.push({j: j});
            localStorage.setItem('zru_d', JSON.stringify(d));
            document.getElementById('adm-jmeno').value = "";
            nactiPavouka();
        }

        function nactiPavouka() {
            // Prioritně bere data z paměti, pokud tam nejsou, vezme ty z kódu
            let data = JSON.parse(localStorage.getItem('zru_d') || JSON.stringify(jezdciNapevno));
            let q1 = document.getElementById('p-q1'); let q2 = document.getElementById('p-q2');
            q1.innerHTML = ""; q2.innerHTML = "";
            data.forEach((j, i) => {
                let s = `<div class="slot">${i+1}. ${j.j}</div>`;
                if(i < 5) q1.innerHTML += s; else if(i < 10) q2.innerHTML += s;
            });
        }

        window.onload = () => {
            vypocitejSampionat();
            nactiPavouka();
        };
    </script>
</body>
</html>
